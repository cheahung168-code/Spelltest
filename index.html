<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpellBound Champion</title>
    <style>
        :root { --primary: #6AC5FE; --secondary: #A06AFE; --accent: #FFB347; --bg: #F0F9FF; --success: #4CAF50; }
        body { font-family: 'Lexend', sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .screen { display: none; width: 100%; max-width: 600px; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box; }
        .active { display: flex; }

        /* Parent & Common UI */
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); width: 100%; text-align: center; }
        textarea { width: 100%; height: 80px; border: 2px solid #ddd; border-radius: 10px; padding: 10px; margin: 15px 0; box-sizing: border-box; }
        
        .bubbles-container { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin: 20px 0; }
        .bubble { width: 60px; height: 60px; background: white; border: 4px solid var(--primary); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.8rem; font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 var(--primary); }
        
        .speak-btn { background: var(--accent); border: none; border-radius: 50%; width: 70px; height: 70px; font-size: 2rem; cursor: pointer; box-shadow: 0 5px 0 #e6951f; }

        /* Final Revision List */
        .final-list { width: 100%; margin-top: 10px; max-height: 250px; overflow-y: auto; padding: 10px; }
        .word-row { display: flex; align-items: center; background: white; margin-bottom: 8px; padding: 12px; border-radius: 15px; gap: 15px; border: 2px solid transparent; }
        .word-row.active-row { border-color: var(--secondary); background: #fdfaff; transform: scale(1.02); }
        .mini-speak { background: var(--primary); border: none; border-radius: 50%; width: 40px; height: 40px; color: white; cursor: pointer; }
        .final-display { flex-grow: 1; font-size: 1.4rem; font-weight: bold; color: var(--secondary); border-bottom: 2px solid #ddd; height: 25px; }

        /* Keypads */
        .keypad { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; width: 100%; margin-top: 10px; }
        .full-keypad { display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px; width: 100%; margin-top: 10px; }
        .key { background: white; border: 2px solid #eee; padding: 12px 0; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 #ddd; }
        .key:active { transform: translateY(2px); box-shadow: none; }

        /* Trophy Styles */
        #trophy-img { width: 150px; margin: 20px; animation: bounce 1s infinite alternate; }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-10px); } }

        button.primary { background: var(--primary); color: white; border: none; padding: 15px 40px; border-radius: 50px; font-size: 1.2rem; cursor: pointer; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="parent-screen" class="screen active">
        <h1>Parent Dashboard</h1>
        <div class="card">
            <textarea id="word-input" placeholder="Type words here..."></textarea>
            <button class="primary" onclick="startTest()">Start Revision</button>
        </div>
    </div>

    <div id="phase1-screen" class="screen">
        <button class="speak-btn" onclick="speakCurrentWord()">👂</button>
        <div id="bubbles-area" class="bubbles-container"></div>
        <button class="primary" onclick="goToPhase2()">OK - Test Me!</button>
    </div>

    <div id="phase2-screen" class="screen">
        <button class="speak-btn" onclick="speakCurrentWord()">👂</button>
        <div id="user-input-view" style="font-size: 3rem; margin: 20px; min-height: 60px; color: var(--secondary); font-weight: 900;"></div>
        <div id="test-keypad" class="keypad"></div>
    </div>

    <div id="summary-screen" class="screen">
        <h2>🎉 Final Challenge</h2>
        <div id="final-list-container" class="final-list"></div>
        <div id="final-keypad" class="full-keypad"></div>
        
        <div id="victory-area" style="display:none; text-align:center;">
            <img id="trophy-img" src="https://img.icons8.com/emoji/160/trophy-emoji.png" alt="Trophy">
            <h1 style="color: var(--accent);">Perfect! You got it!</h1>
            <button class="primary" onclick="location.reload()">Play Again</button>
        </div>
    </div>

    <script>
        let wordList = [];
        let currentIndex = 0;
        let currentInput = "";
        let finalResults = [];
        let femaleVoice = null;

        // Initialize Voice
        window.speechSynthesis.onvoiceschanged = () => {
            const voices = window.speechSynthesis.getVoices();
            femaleVoice = voices.find(v => v.name.includes('Female') || v.name.includes('Google UK English Female') || v.name.includes('Samantha')) || voices[0];
        };

        const phonics = {
            'A': 'æ', 'B': 'buh', 'C': 'kuh', 'D': 'duh', 'E': 'eh', 'F': 'fuh', 'G': 'guh', 'H': 'huh', 
            'I': 'ih', 'J': 'juh', 'K': 'kuh', 'L': 'ull', 'M': 'muh', 'N': 'nun', 'O': 'ah', 'P': 'puh', 
            'Q': 'kwuh', 'R': 'ruh', 'S': 'ssssssss', 'T': 'tuh', 'U': 'uh', 'V': 'vuh', 'W': 'wuh', 'X': 'ks', 
            'Y': 'yuh', 'Z': 'zzz'
        };

        const praises = ["Good work!", "Great job!", "Fantastic!", "Awesome!", "You got it!", "Well done!"];

        function startTest() {
            const input = document.getElementById('word-input').value;
            wordList = input.split(/[ ,]+/).filter(w => w.length > 0).map(w => w.toUpperCase());
            if (!wordList.length) return alert("Enter words!");
            currentIndex = 0;
            loadPhase1();
        }

        function loadPhase1() {
            showScreen('phase1-screen');
            const area = document.getElementById('bubbles-area');
            area.innerHTML = '';
            wordList[currentIndex].split('').forEach(char => {
                const b = document.createElement('div'); b.className = 'bubble'; b.innerText = char;
                b.onclick = () => speak(phonics[char] || char);
                area.appendChild(b);
            });
        }

        function goToPhase2() {
            showScreen('phase2-screen');
            currentInput = "";
            document.getElementById('user-input-view').innerText = "";
            setupKeypad('test-keypad', false);
        }

        function showSummary() {
            showScreen('summary-screen');
            currentIndex = 0;
            currentInput = "";
            finalResults = new Array(wordList.length).fill(false);
            const container = document.getElementById('final-list-container');
            container.innerHTML = '';
            
            wordList.forEach((word, idx) => {
                const row = document.createElement('div');
                row.className = 'word-row';
                row.id = `row-${idx}`;
                row.innerHTML = `<button class="mini-speak" onclick="selectRow(${idx})">🔊</button><div class="final-display" id="display-${idx}"></div><div id="status-${idx}">⚪</div>`;
                container.appendChild(row);
            });
            selectRow(0);
            setupKeypad('final-keypad', true);
        }

        function selectRow(idx) {
            if (finalResults[idx]) return;
            currentIndex = idx;
            currentInput = "";
            document.querySelectorAll('.word-row').forEach(r => r.classList.remove('active-row'));
            document.getElementById(`row-${idx}`).classList.add('active-row');
            speak(wordList[idx]);
        }

        function setupKeypad(containerId, isFull) {
            const area = document.getElementById(containerId);
            area.innerHTML = '';
            let letters = isFull ? "QWERTYUIOPASDFGHJKLZXCVBNM".split('') : generateLimitedLetters();
            letters.forEach(L => {
                const btn = document.createElement('button');
                btn.className = 'key'; btn.innerText = L;
                btn.onclick = () => handleInput(L, isFull);
                area.appendChild(btn);
            });
        }

        function handleInput(letter, isFull) {
            currentInput += letter;
            const target = wordList[currentIndex];
            const displayId = isFull ? `display-${currentIndex}` : 'user-input-view';
            document.getElementById(displayId).innerText = currentInput;

            if (currentInput === target) {
                const praise = praises[Math.floor(Math.random() * praises.length)];
                speak(praise);
                setTimeout(() => {
                    if (isFull) {
                        finalResults[currentIndex] = true;
                        document.getElementById(`status-${currentIndex}`).innerText = "✅";
                        let next = finalResults.indexOf(false);
                        if (next !== -1) selectRow(next);
                        else showVictory();
                    } else {
                        currentIndex++;
                        currentIndex < wordList.length ? loadPhase1() : showSummary();
                    }
                }, 1000);
            } else if (!target.startsWith(currentInput)) {
                currentInput = "";
                document.getElementById(displayId).innerText = "";
            }
        }

        function showVictory() {
            document.getElementById('final-keypad').style.display = 'none';
            document.getElementById('final-list-container').style.display = 'none';
            document.getElementById('victory-area').style.display = 'block';
            speak("Perfect! You got it! You are the champion!");
        }

        function generateLimitedLetters() {
            let letters = [...new Set(wordList[currentIndex].split(''))];
            const alpha = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            while(letters.length < 10) {
                let r = alpha[Math.floor(Math.random() * 26)];
                if(!letters.includes(r)) letters.push(r);
            }
            return letters.sort(() => Math.random() - 0.5);
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function speak(text) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.voice = femaleVoice;
            msg.rate = 0.7;
            window.speechSynthesis.speak(msg);
        }

        function speakCurrentWord() { speak(wordList[currentIndex]); }
    </script>
</body>
</html>
