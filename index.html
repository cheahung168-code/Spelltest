<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpellBound Champion</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6AC5FE; --secondary: #A06AFE; --accent: #FFB347; --bg: #F0F9FF; --success: #4CAF50; --error: #FF5252; }
        
        body { font-family: 'Lexend', sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
        .screen { display: none; width: 100%; max-width: 600px; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box; animation: fadeIn 0.5s; }
        .active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Parent UI */
        .card { background: white; padding: 25px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 100%; text-align: center; }
        textarea { width: 100%; height: 120px; border: 3px solid #eee; border-radius: 15px; padding: 15px; font-size: 1.1rem; margin: 20px 0; box-sizing: border-box; font-family: inherit; }
        
        /* Child UI Phase 1 & 2 */
        .bubbles-container { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin: 30px 0; }
        .bubble { width: 70px; height: 70px; background: white; border: 4px solid var(--primary); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 2.2rem; font-weight: 900; cursor: pointer; box-shadow: 0 6px 0 var(--primary); transition: 0.1s; color: #444; }
        .bubble:active { transform: translateY(4px); box-shadow: none; }
        
        .input-display { font-size: 3.5rem; letter-spacing: 4px; height: 80px; border-bottom: 5px dashed #ccc; width: 90%; text-align: center; margin: 20px 0; font-weight: 900; color: var(--secondary); transition: color 0.3s; }

        .speak-btn { background: var(--accent); border: none; border-radius: 50%; width: 90px; height: 90px; font-size: 3rem; cursor: pointer; box-shadow: 0 7px 0 #e6951f; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; }
        .speak-btn:active { transform: translateY(5px); box-shadow: none; }

        /* Keypads */
        .keypad { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; width: 100%; margin-top: 20px; }
        .full-keypad { display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; width: 100%; margin-top: 15px; }
        .key { background: white; border: 2px solid #eee; padding: 15px 0; border-radius: 12px; font-size: 1.3rem; font-weight: bold; cursor: pointer; box-shadow: 0 5px 0 #ddd; transition: 0.1s; }
        .key:active { transform: translateY(3px); box-shadow: none; background: #fcfcfc; }
        .key-special { background: #FFF3E0; border-color: var(--accent); }

        /* Final Revision List */
        .final-list { width: 100%; margin-top: 10px; max-height: 280px; overflow-y: auto; padding: 10px; }
        .word-row { display: flex; align-items: center; background: white; margin-bottom: 10px; padding: 15px; border-radius: 20px; gap: 15px; border: 3px solid transparent; transition: 0.3s; }
        .word-row.active-row { border-color: var(--secondary); background: #fdfaff; transform: scale(1.02); }
        .mini-speak { background: var(--primary); border: none; border-radius: 50%; width: 45px; height: 45px; color: white; cursor: pointer; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; }
        .final-display { flex-grow: 1; font-size: 1.6rem; font-weight: 800; color: var(--secondary); border-bottom: 3px solid #eee; height: 35px; letter-spacing: 2px; }

        /* Victory */
        #trophy-img { width: 180px; margin: 30px; animation: trophyBounce 0.6s infinite alternate cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes trophyBounce { from { transform: translateY(0) rotate(-5deg); } to { transform: translateY(-20px) rotate(5deg); } }

        button.primary { background: var(--primary); color: white; border: none; padding: 18px 50px; border-radius: 50px; font-size: 1.4rem; cursor: pointer; font-weight: 900; margin-top: 20px; box-shadow: 0 6px 0 #4ba3db; }
        button.primary:active { transform: translateY(3px); box-shadow: none; }
    </style>
</head>
<body>

    <div id="parent-screen" class="screen active">
        <h1 style="color: var(--primary); font-size: 2.5rem;">SpellBound</h1>
        <div class="card">
            <p><strong>Parent Mode:</strong> Enter words for the week</p>
            <textarea id="word-input" placeholder="Enter words like: apple, don't, garden, it's"></textarea>
            <button class="primary" onclick="startTest()">Let's Play!</button>
        </div>
    </div>

    <div id="phase1-screen" class="screen">
        <h2 style="color: #666;">Step 1: Listen & Learn</h2>
        <button class="speak-btn" onclick="speakCurrentWord()">👂</button>
        <div id="bubbles-area" class="bubbles-container"></div>
        <button class="primary" style="background: var(--success); box-shadow: 0 6px 0 #3e8e41;" onclick="goToPhase2()">I'm Ready! OK</button>
    </div>

    <div id="phase2-screen" class="screen">
        <h2 style="color: #666;">Step 2: Can you spell it?</h2>
        <button class="speak-btn" onclick="speakCurrentWord()">👂</button>
        <div id="user-input-view" class="input-display"></div>
        <div id="test-keypad" class="keypad"></div>
    </div>

    <div id="summary-screen" class="screen">
        <h2 style="color: var(--secondary);">The Final Challenge!</h2>
        <div id="final-list-container" class="final-list"></div>
        
        <div id="keyboard-container" style="width:100%">
            <div id="final-keypad" class="full-keypad"></div>
        </div>

        <div id="victory-area" style="display:none; text-align:center;">
            <img id="trophy-img" src="https://img.icons8.com/emoji/160/trophy-emoji.png" alt="Trophy">
            <h1 style="color: var(--accent); font-size: 2rem;">Perfect! You got it!</h1>
            <button class="primary" onclick="location.reload()">Start New Test</button>
        </div>
    </div>

    <script>
        let wordList = [];
        let currentIndex = 0;
        let currentInput = "";
        let finalResults = [];
        let ladyVoice = null;

        // Load Voices
        function loadVoices() {
            const voices = window.speechSynthesis.getVoices();
            // Try to find a friendly female voice
            ladyVoice = voices.find(v => v.name.includes('Female') || v.name.includes('Samantha') || v.name.includes('Google UK English Female') || v.name.includes('Apple')) || voices[0];
        }
        window.speechSynthesis.onvoiceschanged = loadVoices;
        loadVoices();

        const phonics = {
            'A': 'æ', 'B': 'buh', 'C': 'kuh', 'D': 'duh', 'E': 'eh', 'F': 'fuh', 'G': 'guh', 'H': 'huh', 
            'I': 'ih', 'J': 'juh', 'K': 'kuh', 'L': 'ull', 'M': 'muh', 'N': 'nun', 'O': 'ah', 'P': 'puh', 
            'Q': 'kwuh', 'R': 'ruh', 'S': 'ssssssssss', 'T': 'tuh', 'U': 'uh', 'V': 'vuh', 'W': 'wuh', 'X': 'ks', 
            'Y': 'yuh', 'Z': 'zzz'
        };

        const praises = ["Good work!", "Great job!", "Fantastic!", "Awesome!", "You got it!", "Well done!"];

        function startTest() {
            const input = document.getElementById('word-input').value;
            wordList = input.split(/[ ,]+/).filter(w => w.length > 0).map(w => w.toUpperCase());
            if (wordList.length === 0) return alert("Please enter at least one word!");
            currentIndex = 0;
            loadPhase1();
        }

        function loadPhase1() {
            showScreen('phase1-screen');
            const area = document.getElementById('bubbles-area');
            area.innerHTML = '';
            wordList[currentIndex].split('').forEach(char => {
                const b = document.createElement('div');
                b.className = 'bubble';
                b.innerText = char;
                b.onclick = () => speak(phonics[char] || char);
                area.appendChild(b);
            });
            speakCurrentWord();
        }

        function goToPhase2() {
            showScreen('phase2-screen');
            currentInput = "";
            document.getElementById('user-input-view').innerText = "";
            setupKeypad('test-keypad', false);
        }

        function showSummary() {
            showScreen('summary-screen');
            currentIndex = 0;
            currentInput = "";
            finalResults = new Array(wordList.length).fill(false);
            
            const container = document.getElementById('final-list-container');
            container.innerHTML = '';
            
            wordList.forEach((word, idx) => {
                const row = document.createElement('div');
                row.className = 'word-row';
                row.id = `row-${idx}`;
                row.innerHTML = `
                    <button class="mini-speak" onclick="selectRow(${idx})">🔊</button>
                    <div class="final-display" id="display-${idx}"></div>
                    <div id="status-${idx}" style="font-size:1.5rem">⚪</div>
                `;
                container.appendChild(row);
            });
            
            selectRow(0);
            setupKeypad('final-keypad', true);
        }

        function selectRow(idx) {
            if (finalResults[idx]) return;
            currentIndex = idx;
            currentInput = "";
            document.querySelectorAll('.word-row').forEach(r => r.classList.remove('active-row'));
            const activeRow = document.getElementById(`row-${idx}`);
            if(activeRow) {
                activeRow.classList.add('active-row');
                activeRow.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
            speak(wordList[idx]);
        }

        function setupKeypad(containerId, isFull) {
            const area = document.getElementById(containerId);
            area.innerHTML = '';
            
            let letters;
            if (isFull) {
                // QWERTY + Apostrophe
                letters = "QWERTYUIOPASDFGHJKLZXCVBNM'".split('');
                area.className = "full-keypad";
            } else {
                letters = generateLimitedLetters();
                area.className = "keypad";
            }
            
            letters.forEach(L => {
                const btn = document.createElement('button');
                btn.className = 'key';
                if(L === "'") btn.classList.add('key-special');
                btn.innerText = L;
                btn.onclick = () => handleInput(L, isFull);
                area.appendChild(btn);
            });

            // Add Backspace
            const del = document.createElement('button');
            del.className = 'key';
            del.style.background = '#FFEBEE';
            del.innerText = '⌫';
            del.onclick = () => {
                currentInput = currentInput.slice(0, -1);
                const view = isFull ? document.getElementById(`display-${currentIndex}`) : document.getElementById('user-input-view');
                view.innerText = currentInput;
            };
            area.appendChild(del);
        }

        function handleInput(letter, isFull) {
            currentInput += letter;
            const target = wordList[currentIndex];
            const display = isFull ? document.getElementById(`display-${currentIndex}`) : document.getElementById('user-input-view');
            
            display.innerText = currentInput;

            if (currentInput === target) {
                const praise = praises[Math.floor(Math.random() * praises.length)];
                speak(praise);
                
                setTimeout(() => {
                    if (isFull) {
                        finalResults[currentIndex] = true;
                        document.getElementById(`status-${currentIndex}`).innerText = "✅";
                        let next = finalResults.indexOf(false);
                        if (next !== -1) selectRow(next);
                        else showVictory();
                    } else {
                        currentIndex++;
                        currentIndex < wordList.length ? loadPhase1() : showSummary();
                    }
                }, 1000);
            } else if (!target.startsWith(currentInput)) {
                // Shake effect or red flash
                display.style.color = 'var(--error)';
                setTimeout(() => {
                    currentInput = "";
                    display.innerText = "";
                    display.style.color = isFull ? 'var(--secondary)' : 'var(--secondary)';
                }, 400);
            }
        }

        function generateLimitedLetters() {
            let wordLetters = [...new Set(wordList[currentIndex].replace(/[^A-Z]/g, '').split(''))];
            if(wordList[currentIndex].includes("'")) wordLetters.push("'");
            
            const alpha = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            while(wordLetters.length < 9) {
                let r = alpha[Math.floor(Math.random() * 26)];
                if(!wordLetters.includes(r)) wordLetters.push(r);
            }
            return wordLetters.sort(() => Math.random() - 0.5);
        }

        function showVictory() {
            document.getElementById('final-list-container').style.display = 'none';
            document.getElementById('keyboard-container').style.display = 'none';
            document.getElementById('victory-area').style.display = 'block';
            speak("Perfect! You got it! You are the champion!");
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function speak(text) {
            window.speechSynthesis.cancel(); // Stop current speech
            const msg = new SpeechSynthesisUtterance(text);
            if(ladyVoice) msg.voice = ladyVoice;
            msg.rate = 0.7; 
            window.speechSynthesis.speak(msg);
        }

        function speakCurrentWord() { speak(wordList[currentIndex]); }
    </script>
</body>
</html>
